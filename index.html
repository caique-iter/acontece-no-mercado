<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acontece no Mercado</title>
  <style>
    :root {
      --primary: #1a3a5c;
      --accent: #e8a020;
      --bg: #f0f2f6;
      --card-bg: #ffffff;
      --text: #1e2d3d;
      --text-muted: #6b7a8d;
      --border: #dde3ec;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* HEADER */
    header {
      background: var(--primary);
      color: white;
      padding: 0 24px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,.3);
    }
    .header-inner {
      max-width: 1280px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      height: 62px; gap: 16px;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
    .logo-icon { font-size: 26px; }
    .logo-text { font-size: 19px; font-weight: 700; letter-spacing: -.3px; }
    .logo-sub { font-size: 10px; opacity: .6; letter-spacing: .8px; text-transform: uppercase; }
    .header-right { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
    .search-wrap { position: relative; }
    .search-wrap input {
      background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2);
      color: white; padding: 8px 36px 8px 12px; border-radius: 20px;
      font-size: 13px; width: 230px; outline: none; transition: background .2s;
    }
    .search-wrap input::placeholder { color: rgba(255,255,255,.45); }
    .search-wrap input:focus { background: rgba(255,255,255,.2); }
    .search-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); opacity:.5; pointer-events:none; }
    #status-badge { font-size: 11px; opacity: .65; white-space: nowrap; }

    /* ALERTA CONCORRENTES */
    #rival-alert {
      display: none;
      background: #fff3cd; border-bottom: 2px solid #e8a020;
      padding: 8px 24px; font-size: 13px; font-weight: 500; color: #7a4a00;
      cursor: pointer; text-align: center;
    }
    #rival-alert:hover { background: #fde8a0; }

    /* FILTROS */
    .filters-bar {
      background: var(--card-bg); border-bottom: 1px solid var(--border);
      position: sticky; top: 62px; z-index: 99;
    }
    .filters-inner {
      max-width: 1280px; margin: 0 auto; padding: 0 24px;
      display: flex; gap: 2px; overflow-x: auto; scrollbar-width: none;
    }
    .filters-inner::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 11px 14px; border: none; background: none; cursor: pointer;
      font-size: 13px; font-weight: 500; color: var(--text-muted); white-space: nowrap;
      border-bottom: 3px solid transparent; transition: all .15s;
      display: flex; align-items: center; gap: 5px;
    }
    .filter-btn:hover { color: var(--primary); }
    .filter-btn.active { color: var(--primary); border-bottom-color: var(--accent); font-weight: 700; }
    .filter-btn .badge {
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--bg); border-radius: 10px; font-size: 11px;
      padding: 1px 6px; color: var(--text-muted); min-width: 20px;
    }
    .filter-btn.active .badge { background: var(--accent); color: white; }
    .filter-rival { border-left: 3px solid #dc3545 !important; }

    /* MAIN */
    main { max-width: 1280px; margin: 0 auto; padding: 20px 24px; }

    /* BARRA SUPERIOR */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; gap: 12px; flex-wrap: wrap;
    }
    .month-nav { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .month-btn {
      background: var(--card-bg); border: 1px solid var(--border);
      padding: 5px 13px; border-radius: 20px; cursor: pointer;
      font-size: 12px; font-weight: 500; color: var(--text-muted); transition: all .15s;
    }
    .month-btn:hover { border-color: var(--primary); color: var(--primary); }
    .month-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    #total-label { font-size: 13px; color: var(--text-muted); }

    /* GRID */
    #news-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
    }

    /* CARD */
    .card {
      background: var(--card-bg); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px;
      display: flex; flex-direction: column; gap: 10px;
      transition: box-shadow .2s, transform .2s;
      text-decoration: none; color: inherit;
      position: relative;
    }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,.11); transform: translateY(-2px); }
    .card.rival { border-left: 3px solid #dc3545; }

    .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .card-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; margin-top: 2px; }

    .tags-row { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 20px;
      color: white; letter-spacing: .3px; text-transform: uppercase; cursor: pointer;
      transition: opacity .15s;
    }
    .tag:hover { opacity: .8; }
    .tag.rival-tag { animation: pulse-rival 2s infinite; }
    @keyframes pulse-rival {
      0%, 100% { box-shadow: 0 0 0 0 rgba(220,53,69,.4); }
      50% { box-shadow: 0 0 0 4px rgba(220,53,69,.0); }
    }

    .card-title { font-size: 14px; font-weight: 600; line-height: 1.45; color: var(--text); }
    .card-resumo {
      font-size: 12.5px; color: var(--text-muted); line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-footer {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: auto; padding-top: 10px; border-top: 1px solid var(--border);
    }
    .fonte-label { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .read-link { font-size: 12px; color: var(--primary); font-weight: 700; text-decoration: none; }
    .read-link:hover { text-decoration: underline; }

    /* ESTADO VAZIO / CARREGANDO */
    .state-box {
      grid-column: 1 / -1; text-align: center; padding: 80px 20px; color: var(--text-muted);
    }
    .state-icon { font-size: 52px; margin-bottom: 18px; }
    .state-box h3 { font-size: 18px; margin-bottom: 10px; color: var(--text); }
    .state-box p { font-size: 14px; max-width: 440px; margin: 0 auto; line-height: 1.7; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 36px; height: 36px; border: 3px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .8s linear infinite; margin: 0 auto 20px;
    }

    /* FOOTER */
    footer {
      text-align: center; padding: 20px 24px; font-size: 12px;
      color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 40px;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="logo" href="#" onclick="resetFiltros(); return false;">
      <span class="logo-icon">🗞️</span>
      <div>
        <div class="logo-text">Acontece no Mercado</div>
        <div class="logo-sub">Grupo Iter · Monitor Turístico</div>
      </div>
    </a>
    <div class="header-right">
      <div class="search-wrap">
        <input type="text" id="search-input" placeholder="Buscar notícias..." />
        <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </div>
      <span id="status-badge">Carregando…</span>
    </div>
  </div>
</header>

<div id="rival-alert" onclick="filtrarPorTag('Concorrentes')">
  ⚔️ <span id="rival-count"></span> menção(ões) a concorrentes hoje — clique para ver
</div>

<div class="filters-bar">
  <div class="filters-inner" id="filters-bar"></div>
</div>

<main>
  <div class="top-bar">
    <div class="month-nav" id="month-nav"></div>
    <span id="total-label"></span>
  </div>
  <div id="news-grid">
    <div class="state-box"><div class="spinner"></div><h3>Carregando notícias…</h3></div>
  </div>
</main>

<footer id="footer">Acontece no Mercado · Grupo Iter</footer>

<script>
  // ── Estado global ─────────────────────────────────────────────────────────
  let TODAS = [];
  let tagAtiva = 'Todas';
  let mesAtivo = null;
  let buscaAtiva = '';
  let catCores = {};
  let catEmojis = {};

  // ── Utilitários ───────────────────────────────────────────────────────────
  const fmtData = iso => new Date(iso).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'});
  const fmtMes = ym => { const [y,m] = ym.split('-'); return new Date(y,m-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'}); };
  const getMes = iso => iso.substring(0,7);
  const corCat = n => catCores[n] || '#6b7a8d';
  const emojiCat = n => catEmojis[n] || '';

  // ── Filtro ativo ──────────────────────────────────────────────────────────
  function noticiasBase() {
    let lista = TODAS;
    if (mesAtivo) lista = lista.filter(n => getMes(n.data) === mesAtivo);
    if (buscaAtiva.length >= 2) {
      const q = buscaAtiva.toLowerCase();
      lista = lista.filter(n =>
        n.titulo.toLowerCase().includes(q) ||
        (n.resumo||'').toLowerCase().includes(q) ||
        n.fonte.toLowerCase().includes(q) ||
        (n.tags||[]).join(' ').toLowerCase().includes(q)
      );
    }
    return lista;
  }

  function noticiasFiltradas() {
    let lista = noticiasBase();
    if (tagAtiva !== 'Todas')
      lista = lista.filter(n => (n.tags || [n.categoria]).includes(tagAtiva));
    return lista;
  }

  // ── Renderização principal ────────────────────────────────────────────────
  function renderizar() {
    const lista = noticiasFiltradas();
    const grid = document.getElementById('news-grid');
    document.getElementById('total-label').textContent =
      lista.length ? `${lista.length} notícia${lista.length !== 1 ? 's' : ''}` : '';

    if (!lista.length) {
      grid.innerHTML = `<div class="state-box">
        <div class="state-icon">📭</div>
        <h3>Nenhuma notícia encontrada</h3>
        <p>Tente outro filtro, mês ou termo de busca.</p></div>`;
      return;
    }

    grid.innerHTML = lista.map(n => {
      const tags = n.tags || [n.categoria];
      const isRival = tags.includes('Concorrentes');
      const tagsHtml = tags.map(t =>
        `<span class="tag ${t==='Concorrentes'?'rival-tag':''}"
          style="background:${corCat(t)}"
          onclick="event.preventDefault(); filtrarPorTag('${t}')"
          title="Filtrar por ${t}">${emojiCat(t)} ${t}</span>`
      ).join('');
      return `
        <a class="card${isRival?' rival':''}" href="${n.url}" target="_blank" rel="noopener">
          <div class="card-header">
            <div class="tags-row">${tagsHtml}</div>
            <span class="card-date">${fmtData(n.data)}</span>
          </div>
          <div class="card-title">${n.titulo}</div>
          ${n.resumo ? `<div class="card-resumo">${n.resumo}</div>` : ''}
          <div class="card-footer">
            <span class="fonte-label">📰 ${n.fonte}</span>
            <span class="read-link">Ler →</span>
          </div>
        </a>`;
    }).join('');
  }

  // ── Filtro por tag (clique no botão ou na tag do card) ────────────────────
  function filtrarPorTag(tag) {
    tagAtiva = tag;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tag === tag);
    });
    atualizarContagens();
    renderizar();
    window.scrollTo({top: 120, behavior: 'smooth'});
  }

  function resetFiltros() {
    tagAtiva = 'Todas';
    buscaAtiva = '';
    document.getElementById('search-input').value = '';
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tag === 'Todas');
    });
    atualizarContagens();
    renderizar();
  }

  // ── Contagens nos botões ──────────────────────────────────────────────────
  function atualizarContagens() {
    const base = noticiasBase();
    document.querySelectorAll('.filter-btn').forEach(btn => {
      const tag = btn.dataset.tag;
      const cnt = tag === 'Todas'
        ? base.length
        : base.filter(n => (n.tags || [n.categoria]).includes(tag)).length;
      const badge = btn.querySelector('.badge');
      if (badge) badge.textContent = cnt;
    });
  }

  // ── Construir barra de filtros ────────────────────────────────────────────
  function construirFiltros(categoriasOrdenadas) {
    const bar = document.getElementById('filters-bar');
    bar.innerHTML = '';

    const todasBtn = document.createElement('button');
    todasBtn.className = 'filter-btn active';
    todasBtn.dataset.tag = 'Todas';
    todasBtn.onclick = () => filtrarPorTag('Todas');
    todasBtn.innerHTML = `Todas <span class="badge">0</span>`;
    bar.appendChild(todasBtn);

    // Tags que aparecem nos dados
    const tagsPresentes = new Set();
    TODAS.forEach(n => (n.tags || [n.categoria]).forEach(t => tagsPresentes.add(t)));

    // Ordenar seguindo a ordem do config
    const ordem = categoriasOrdenadas.map(c => c.nome);
    const tagsOrdenadas = [...tagsPresentes].sort((a, b) => {
      const ia = ordem.indexOf(a), ib = ordem.indexOf(b);
      if (ia === -1 && ib === -1) return a.localeCompare(b);
      if (ia === -1) return 1;
      if (ib === -1) return -1;
      return ia - ib;
    });

    tagsOrdenadas.forEach(tag => {
      const btn = document.createElement('button');
      btn.className = `filter-btn${tag === 'Concorrentes' ? ' filter-rival' : ''}`;
      btn.dataset.tag = tag;
      btn.onclick = () => filtrarPorTag(tag);
      btn.innerHTML = `${emojiCat(tag)} ${tag} <span class="badge">0</span>`;
      bar.appendChild(btn);
    });
  }

  // ── Navegação mensal ──────────────────────────────────────────────────────
  function construirMeses(
