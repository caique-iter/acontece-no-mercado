<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acontece no Mercado</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ── Tokens ─────────────────────────────────────────────────────────── */
:root {
  --navy:       #0f172a;
  --navy-80:    #1e3a5f;
  --navy-10:    #f0f4f8;
  --accent:     #0369a1;
  --accent-lt:  #e0f2fe;
  --gold:       #d97706;
  --red:        #dc2626;
  --bg:         #f4f6f9;
  --surface:    #ffffff;
  --border:     #e2e8f0;
  --text:       #0f172a;
  --text-2:     #475569;
  --text-3:     #94a3b8;
  --sidebar-w:  256px;
  --header-h:   56px;
  --radius:     10px;
  --radius-sm:  6px;
  --shadow:     0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.05);
  --shadow-lg:  0 4px 24px rgba(0,0,0,.13);
  --font:       'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
  --t:          .18s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { font-size:16px; -webkit-font-smoothing:antialiased; }
body { font-family:var(--font); background:var(--bg); color:var(--text); overflow-x:hidden; }
a { text-decoration:none; color:inherit; }
button { cursor:pointer; border:none; background:none; font-family:inherit; }
img { display:block; max-width:100%; }

/* ── Header ──────────────────────────────────────────────────────────── */
.header {
  position:fixed; top:0; left:0; right:0; height:var(--header-h);
  background:var(--navy); z-index:100;
  display:flex; align-items:center; gap:14px; padding:0 18px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.header-logo {
  display:flex; align-items:center; gap:10px;
  color:#fff; white-space:nowrap; width:var(--sidebar-w);
}
.header-logo-mark {
  width:30px; height:30px; background:var(--gold); border-radius:7px;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; flex-shrink:0;
}
.header-logo-text { font-size:14px; font-weight:800; letter-spacing:-.2px; }
.header-logo-sub  { font-size:10px; font-weight:400; opacity:.5; letter-spacing:.4px; text-transform:uppercase; }
.header-search {
  flex:1; position:relative; max-width:460px;
}
.header-search input {
  width:100%; height:36px; padding:0 36px 0 36px;
  border-radius:18px; border:none;
  background:rgba(255,255,255,.09); color:#fff;
  font-family:var(--font); font-size:13.5px;
  transition:background var(--t); outline:none;
}
.header-search input::placeholder { color:rgba(255,255,255,.38); }
.header-search input:focus { background:rgba(255,255,255,.14); }
.header-search .s-icon {
  position:absolute; left:12px; top:50%; transform:translateY(-50%);
  color:rgba(255,255,255,.45); font-size:14px; pointer-events:none;
}
.header-search .s-clear {
  position:absolute; right:11px; top:50%; transform:translateY(-50%);
  color:rgba(255,255,255,.45); font-size:17px; cursor:pointer;
  display:none; background:none; border:none; padding:0; line-height:1;
}
.header-meta {
  margin-left:auto; display:flex; align-items:center; gap:8px;
}
.header-updated { font-size:11.5px; color:rgba(255,255,255,.45); white-space:nowrap; }
.rival-dot {
  width:8px; height:8px; border-radius:50%; background:var(--gold);
  box-shadow:0 0 0 3px rgba(217,119,6,.3);
  animation:pulse 2s infinite; display:none;
}
@keyframes pulse {
  0%,100%{box-shadow:0 0 0 3px rgba(217,119,6,.3);}
  50%{box-shadow:0 0 0 6px rgba(217,119,6,.1);}
}
.ham { display:none; width:34px; height:34px; align-items:center; justify-content:center;
  border-radius:7px; color:#fff; font-size:18px; }
.ham:hover { background:rgba(255,255,255,.1); }

/* ── Layout ──────────────────────────────────────────────────────────── */
.app { display:flex; padding-top:var(--header-h); min-height:100vh; }

/* ── Sidebar ─────────────────────────────────────────────────────────── */
.sidebar {
  width:var(--sidebar-w); flex-shrink:0;
  position:fixed; top:var(--header-h); bottom:0; left:0;
  background:var(--surface); border-right:1px solid var(--border);
  overflow-y:auto; overflow-x:hidden;
  scrollbar-width:thin; scrollbar-color:var(--border) transparent;
  z-index:80; transition:transform var(--t);
}
.sidebar::-webkit-scrollbar { width:3px; }
.sidebar::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.sidebar-sec { padding:10px 0; }
.sidebar-sec + .sidebar-sec { border-top:1px solid var(--border); }
.sidebar-label {
  font-size:10px; font-weight:700; letter-spacing:.9px; text-transform:uppercase;
  color:var(--text-3); padding:8px 18px 5px;
}
.cat-btn {
  width:100%; display:flex; align-items:center; gap:9px;
  padding:8px 18px; font-family:var(--font); font-size:13px;
  font-weight:500; color:var(--text-2);
  transition:background var(--t), color var(--t);
  position:relative; text-align:left;
}
.cat-btn:hover { background:var(--bg); color:var(--text); }
.cat-btn.active {
  background:#eef5fb; color:var(--accent);
}
.cat-btn.active::before {
  content:''; position:absolute; left:0; top:22%; bottom:22%;
  width:3px; border-radius:0 3px 3px 0; background:var(--accent);
}
.cat-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.cat-emoji { font-size:14px; flex-shrink:0; width:18px; text-align:center; }
.cat-name { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.cat-count {
  font-size:10.5px; font-weight:600; min-width:20px; height:18px;
  background:var(--bg); border-radius:9px; padding:0 5px;
  display:flex; align-items:center; justify-content:center; color:var(--text-3);
}
.cat-btn.active .cat-count { background:var(--accent); color:#fff; }

.month-btn {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:8px 18px; font-family:var(--font); font-size:13px; font-weight:500;
  color:var(--text-2); transition:background var(--t);
}
.month-btn:hover { background:var(--bg); }
.month-btn.active { color:var(--accent); font-weight:600; }

.sidebar-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.35);
  z-index:79; backdrop-filter:blur(2px);
}

/* ── Main ─────────────────────────────────────────────────────────────── */
.main { flex:1; margin-left:var(--sidebar-w); padding:24px 28px; min-width:0; max-width:1200px; }

/* Rival alert */
.rival-alert {
  display:none; align-items:flex-start; gap:12px;
  background:#fef2f2; border:1px solid #fecaca; border-radius:var(--radius);
  padding:12px 16px; margin-bottom:20px;
}
.rival-alert-icon { font-size:20px; flex-shrink:0; }
.rival-alert-body h4 { font-size:13px; font-weight:700; color:#991b1b; margin-bottom:3px; }
.rival-alert-body p  { font-size:12.5px; color:#7f1d1d; }
.rival-alert-body p a { text-decoration:underline; }

/* Stats bar */
.stats-bar {
  display:flex; align-items:center; gap:10px; margin-bottom:20px; flex-wrap:wrap;
}
.stats-bar h1 { font-size:19px; font-weight:800; color:var(--navy); margin-right:2px; }
.stats-chip {
  font-size:11.5px; font-weight:600; padding:3px 10px; border-radius:16px;
  background:var(--bg); color:var(--text-2); border:1px solid var(--border);
}
.stats-chip.primary { background:var(--navy); color:#fff; border-color:var(--navy); }

/* ── Hero section ────────────────────────────────────────────────────── */
.hero-section { margin-bottom:28px; }

.hero-main { margin-bottom:14px; }

.hero-card {
  border-radius:var(--radius); overflow:hidden;
  box-shadow:var(--shadow-lg); height:390px; position:relative; display:block;
  transition:box-shadow var(--t);
}
.hero-card:hover { box-shadow:0 8px 36px rgba(0,0,0,.18); }
.hero-img {
  position:absolute; inset:0;
}
.hero-img img {
  width:100%; height:100%; object-fit:cover;
  transition:transform .5s ease;
}
.hero-card:hover .hero-img img { transform:scale(1.03); }
.hero-img-bg {
  position:absolute; inset:0;
}
.hero-overlay {
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.45) 45%, rgba(0,0,0,.1) 100%);
}
.hero-content {
  position:absolute; bottom:0; left:0; right:0;
  padding:26px 28px;
}
.hero-cat {
  display:inline-flex; align-items:center; gap:4px;
  font-size:10.5px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;
  padding:4px 11px; border-radius:16px; color:#fff; margin-bottom:11px;
}
.hero-title {
  font-size:26px; font-weight:800; line-height:1.28; color:#fff; margin-bottom:10px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  text-shadow:0 1px 4px rgba(0,0,0,.3);
}
.hero-excerpt {
  font-size:14.5px; line-height:1.55; color:rgba(255,255,255,.82); margin-bottom:14px;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.hero-meta {
  display:flex; align-items:center; gap:8px;
  font-size:12px; color:rgba(255,255,255,.6);
}
.hero-meta .hero-src { font-weight:700; color:rgba(255,255,255,.8); }
.hero-read {
  margin-left:auto; font-size:12.5px; font-weight:700;
  color:#fff; background:rgba(255,255,255,.15); backdrop-filter:blur(6px);
  padding:6px 14px; border-radius:20px; border:1px solid rgba(255,255,255,.25);
  transition:background var(--t);
}
.hero-card:hover .hero-read { background:rgba(255,255,255,.22); }

/* Secondary hero cards */
.hero-secondary { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
.sec-card {
  background:var(--surface); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden; display:flex; flex-direction:column;
  transition:box-shadow var(--t), transform var(--t);
}
.sec-card:hover { box-shadow:var(--shadow-lg); transform:translateY(-2px); }
.sec-img {
  aspect-ratio:16/7; overflow:hidden; background:var(--bg); position:relative;
}
.sec-img img {
  width:100%; height:100%; object-fit:cover;
  transition:transform .4s ease;
}
.sec-card:hover .sec-img img { transform:scale(1.04); }
.sec-img-bg { position:absolute; inset:0; }
.sec-img-emoji {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:32px;
}
.sec-body { padding:13px 14px 14px; flex:1; display:flex; flex-direction:column; }
.sec-cat {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
  padding:3px 9px; border-radius:14px; color:#fff; margin-bottom:8px;
  align-self:flex-start;
}
.sec-title {
  font-size:14.5px; font-weight:700; line-height:1.4; color:var(--text); margin-bottom:8px;
  display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
  flex:1;
}
.sec-title a:hover { color:var(--accent); }
.sec-meta { font-size:11.5px; color:var(--text-3); display:flex; gap:6px; align-items:center; }
.sec-src { font-weight:600; color:var(--text-2); }

/* ── Cards grid ─────────────────────────────────────────────────────── */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(290px, 1fr));
  gap:18px;
}

/* Card */
.card {
  background:var(--surface); border-radius:var(--radius);
  box-shadow:var(--shadow); overflow:hidden;
  display:flex; flex-direction:column;
  transition:transform var(--t), box-shadow var(--t);
}
.card:hover { transform:translateY(-2px); box-shadow:var(--shadow-lg); }

.card-img {
  position:relative; aspect-ratio:16/9; overflow:hidden; background:var(--bg);
}
.card-img img {
  width:100%; height:100%; object-fit:cover;
  transition:transform .4s ease;
}
.card:hover .card-img img { transform:scale(1.04); }
.card-img-bg { position:absolute; inset:0; }
.card-img-emoji {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:34px;
}

.card-body { padding:13px 15px 15px; flex:1; display:flex; flex-direction:column; gap:7px; }

.card-cat {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; font-weight:700; letter-spacing:.4px; text-transform:uppercase;
  padding:3px 9px; border-radius:14px; color:#fff;
  align-self:flex-start;
}
.card-rival-badge {
  display:inline-flex; align-items:center; gap:3px;
  font-size:10px; font-weight:700; padding:3px 9px; border-radius:14px;
  background:#dc2626; color:#fff;
}

.card-title {
  font-size:15px; font-weight:700; line-height:1.42; color:var(--text);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.card-title a:hover { color:var(--accent); }

.card-excerpt {
  font-size:13px; line-height:1.58; color:var(--text-2);
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  flex:1;
}

.card-footer {
  display:flex; align-items:center; justify-content:space-between;
  padding-top:8px; border-top:1px solid var(--border); margin-top:auto;
}
.card-src  { font-size:11.5px; font-weight:600; color:var(--text-2); }
.card-date { font-size:11px; color:var(--text-3); }
.card-link {
  font-size:11.5px; font-weight:700; color:var(--accent);
  display:flex; align-items:center; gap:3px;
  transition:gap var(--t);
}
.card-link:hover { gap:6px; }

/* Empty state */
.empty {
  grid-column:1/-1; text-align:center; padding:56px 20px; color:var(--text-3);
}
.empty-icon { font-size:44px; margin-bottom:10px; }
.empty h3   { font-size:17px; font-weight:700; color:var(--text-2); margin-bottom:5px; }
.empty p    { font-size:13.5px; }

/* Loading */
.loading {
  grid-column:1/-1; display:flex; align-items:center; justify-content:center;
  gap:10px; padding:60px; color:var(--text-3); font-size:13.5px;
}
.spinner {
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--border); border-top-color:var(--accent);
  animation:spin .7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* ── Pagination ──────────────────────────────────────────────────────── */
.pagination { display:flex; justify-content:center; margin-top:28px; }
.pag-inner  { display:flex; align-items:center; gap:6px; }
.pag-btn {
  height:34px; min-width:34px; padding:0 12px;
  border-radius:var(--radius-sm); border:1px solid var(--border);
  background:var(--surface); color:var(--text-2);
  font-family:var(--font); font-size:13px; font-weight:600;
  transition:background var(--t), color var(--t), border-color var(--t);
}
.pag-btn:hover { background:var(--bg); color:var(--text); border-color:var(--text-3); }
.pag-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.pag-btn:disabled { opacity:.4; cursor:default; }
.pag-ellipsis { font-size:13px; color:var(--text-3); padding:0 4px; }

/* ── Responsive ──────────────────────────────────────────────────────── */
@media (max-width:960px) {
  :root { --sidebar-w:240px; }
  .main { padding:20px; }
  .hero-card { height:340px; }
  .hero-title { font-size:22px; }
}
@media (max-width:700px) {
  .ham { display:flex; }
  .header-logo { width:auto; }
  .header-logo-sub { display:none; }
  .sidebar { transform:translateX(-100%); }
  .sidebar.open { transform:translateX(0); }
  .sidebar-overlay.open { display:block; }
  .main { margin-left:0; padding:14px; }
  .grid { grid-template-columns:1fr; gap:14px; }
  .hero-secondary { grid-template-columns:1fr; }
  .hero-card { height:300px; }
  .hero-title { font-size:19px; }
  .header-search { max-width:none; }
  .header-updated { display:none; }
}
@media (max-width:440px) {
  .hero-content { padding:18px; }
  .hero-title { font-size:17px; }
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <button class="ham" id="hamBtn" aria-label="Menu" onclick="toggleSidebar()">&#9776;</button>
  <div class="header-logo">
    <div class="header-logo-mark">🗞️</div>
    <div>
      <div class="header-logo-text" id="jornal-nome">Acontece no Mercado</div>
      <div class="header-logo-sub">Inteligência Turística · ITER</div>
    </div>
  </div>
  <div class="header-search">
    <span class="s-icon">🔍</span>
    <input type="search" id="searchInput" placeholder="Buscar notícias..." oninput="onSearch(this.value)">
    <button class="s-clear" id="searchClear" onclick="clearSearch()">×</button>
  </div>
  <div class="header-meta">
    <div class="rival-dot" id="rivalDot" title="Menções a concorrentes hoje"></div>
    <span class="header-updated" id="lastUpdated"></span>
  </div>
</header>

<!-- Layout -->
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-sec">
      <div class="sidebar-label">Categorias</div>
      <button class="cat-btn active" data-cat="" onclick="setCategory('')" id="cat-all">
        <span class="cat-dot" style="background:#0369a1"></span>
        <span class="cat-emoji">📰</span>
        <span class="cat-name">Todas as Notícias</span>
        <span class="cat-count" id="count-all">0</span>
      </button>
      <div id="cat-list"></div>
    </div>
    <div class="sidebar-sec" id="month-section">
      <div class="sidebar-label">Período</div>
      <div id="month-list"></div>
    </div>
    <div class="sidebar-sec">
      <div class="sidebar-label">Fontes ativas</div>
      <div id="source-list" style="padding:4px 18px 8px;font-size:11.5px;color:var(--text-3);line-height:1.8;"></div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

  <main class="main">

    <!-- Rival alert -->
    <div class="rival-alert" id="rivalAlert">
      <div class="rival-alert-icon">⚔️</div>
      <div class="rival-alert-body">
        <h4 id="rivalTitle">Menções a concorrentes hoje</h4>
        <p id="rivalBody"></p>
      </div>
    </div>

    <!-- Hero section (top-3 por relevância) -->
    <section class="hero-section" id="hero-section" style="display:none"></section>

    <!-- Stats bar -->
    <div class="stats-bar">
      <h1 id="statsTitle">Notícias</h1>
      <span class="stats-chip primary" id="statsCount">0</span>
      <span class="stats-chip" id="statsMonth" style="display:none"></span>
      <span class="stats-chip" id="statsSearch" style="display:none"></span>
    </div>

    <!-- Grid -->
    <div class="grid" id="grid">
      <div class="loading"><div class="spinner"></div> Carregando notícias...</div>
    </div>

    <!-- Pagination -->
    <nav class="pagination" id="pagination"></nav>

  </main>
</div>

<script>
// ── Constants ───────────────────────────────────────────────────────────
const PAGE_SIZE = 18;

// ── State ───────────────────────────────────────────────────────────────
let allNews = [];
let allCategories = [];
let state = { cat:'', month:'', search:'' };
let currentPage = 1;

// ── Category maps ───────────────────────────────────────────────────────
const CAT_GRADIENT = {
  'Big Numbers':                    'linear-gradient(135deg,#1d4ed8,#1e3a8a)',
  'Novidades no Setor':             'linear-gradient(135deg,#059669,#064e3b)',
  'Shows & Eventos':                'linear-gradient(135deg,#ea580c,#7c2d12)',
  'Concorrentes':                   'linear-gradient(135deg,#dc2626,#7f1d1d)',
  'Atrativos Nacionais':            'linear-gradient(135deg,#16a34a,#14532d)',
  'Atrativos Internacionais':       'linear-gradient(135deg,#7c3aed,#3b0764)',
  'Tecnologia & Inovacao':          'linear-gradient(135deg,#0891b2,#164e63)',
  'Politica & Economia':            'linear-gradient(135deg,#4b5563,#1f2937)',
  'Setor Aereo':                    'linear-gradient(135deg,#9333ea,#581c87)',
  'Setor Hoteleiro':                'linear-gradient(135deg,#0369a1,#082f49)',
  'Temporada de Navios & Cruzeiros':'linear-gradient(135deg,#0891b2,#0c4a6e)',
  'Incidentes':                     'linear-gradient(135deg,#dc2626,#450a0a)',
};
const CAT_EMOJI = {
  'Big Numbers':'📊','Novidades no Setor':'🆕','Shows & Eventos':'🎭',
  'Concorrentes':'⚔️','Atrativos Nacionais':'🇧🇷','Atrativos Internacionais':'🌍',
  'Tecnologia & Inovacao':'💡','Politica & Economia':'🏛️','Setor Aereo':'✈️',
  'Setor Hoteleiro':'🏨','Temporada de Navios & Cruzeiros':'🚢','Incidentes':'⚠️',
};

// ── Helpers ─────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
}
function catColor(name) {
  const c = allCategories.find(c => c.nome===name);
  return c?.cor || '#0369a1';
}

// ── Fetch & init ────────────────────────────────────────────────────────
async function init() {
  try {
    const [newsRes, cfgRes] = await Promise.all([
      fetch('data/noticias.json?t=' + Date.now()),
      fetch('config.json?t=' + Date.now())
    ]);
    const data = await newsRes.json();
    const cfg  = await cfgRes.json();

    allNews = (data.noticias || []).map(n => ({
      ...n,
      tags: Array.isArray(n.tags) ? n.tags : [n.categoria || 'Novidades no Setor']
    }));
    allCategories = cfg.categorias || [];

    if (cfg.jornal?.nome) document.getElementById('jornal-nome').textContent = cfg.jornal.nome;

    if (data.ultima_atualizacao) {
      const d = new Date(data.ultima_atualizacao);
      document.getElementById('lastUpdated').textContent =
        'Atualizado ' + d.toLocaleString('pt-BR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'});
    }

    renderSidebar();
    detectRivals();
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p>${e.message}</p></div>`;
  }
}

// ── Filter ──────────────────────────────────────────────────────────────
function filteredNews() {
  let news = allNews;
  if (state.cat)    news = news.filter(n => n.tags?.includes(state.cat));
  if (state.month)  news = news.filter(n => n.data?.startsWith(state.month));
  if (state.search) {
    const q = state.search.toLowerCase();
    news = news.filter(n =>
      (n.titulo||'').toLowerCase().includes(q) ||
      (n.resumo||'').toLowerCase().includes(q) ||
      (n.fonte||'').toLowerCase().includes(q) ||
      (n.tags||[]).some(t => t.toLowerCase().includes(q))
    );
  }
  return news;
}

// ── Sidebar ─────────────────────────────────────────────────────────────
function renderSidebar() {
  const counts = {};
  allNews.forEach(n => (n.tags||[]).forEach(t => { counts[t]=(counts[t]||0)+1; }));
  document.getElementById('count-all').textContent = allNews.length;

  document.getElementById('cat-list').innerHTML =
    allCategories.filter(c => counts[c.nome]>0).map(c => `
      <button class="cat-btn ${state.cat===c.nome?'active':''}"
        data-cat="${esc(c.nome)}" onclick="setCategory('${esc(c.nome)}')">
        <span class="cat-dot" style="background:${c.cor||'#999'}"></span>
        <span class="cat-emoji">${c.emoji||'📄'}</span>
        <span class="cat-name">${esc(c.nome)}</span>
        <span class="cat-count">${counts[c.nome]||0}</span>
      </button>`).join('');

  const months = [...new Set(allNews.map(n=>n.data?.slice(0,7)).filter(Boolean))].sort().reverse();
  const mSec = document.getElementById('month-section');
  if (months.length<=1) { mSec.style.display='none'; return; }
  mSec.style.display='';
  document.getElementById('month-list').innerHTML = months.map(m => {
    const label = new Date(m+'-01').toLocaleString('pt-BR',{month:'long',year:'numeric'});
    return `<button class="month-btn ${state.month===m?'active':''}" onclick="setMonth('${m}')">${label[0].toUpperCase()+label.slice(1)}</button>`;
  }).join('');

  const srcs = [...new Set(allNews.map(n=>n.fonte).filter(Boolean))].sort();
  document.getElementById('source-list').textContent = srcs.join(' · ');
}

// ── Rival alert ─────────────────────────────────────────────────────────
function detectRivals() {
  const today = new Date().toISOString().slice(0,10);
  const rivals = allNews.filter(n => n.data?.startsWith(today) && n.tags?.includes('Concorrentes'));
  if (!rivals.length) return;
  document.getElementById('rivalDot').style.display = 'block';
  const al = document.getElementById('rivalAlert');
  al.style.display = 'flex';
  document.getElementById('rivalTitle').textContent =
    rivals.length===1 ? '1 menção a concorrente detectada hoje' : `${rivals.length} menções a concorrentes hoje`;
  document.getElementById('rivalBody').innerHTML =
    rivals.map(n=>`<a href="${esc(n.url)}" target="_blank">${esc(n.titulo)}</a>`).join(' · ');
}

// ── Hero rendering ──────────────────────────────────────────────────────
function renderHeroCard(n) {
  const tag   = n.tags?.[0] || 'Novidades no Setor';
  const col   = catColor(tag);
  const grad  = CAT_GRADIENT[tag] || 'linear-gradient(135deg,#0f172a,#1e3a5f)';
  const emoji = CAT_EMOJI[tag] || '📄';
  return `
    <a class="hero-card" href="${esc(n.url)}" target="_blank" rel="noopener">
      <div class="hero-img">
        ${n.imagem ? `<img src="${esc(n.imagem)}" alt="">` : ''}
        <div class="hero-img-bg" style="background:${grad};display:${n.imagem?'none':'block'}"></div>
        <div class="hero-overlay"></div>
      </div>
      <div class="hero-content">
        <span class="hero-cat" style="background:${col}">${emoji} ${esc(tag)}</span>
        <h2 class="hero-title">${esc(n.titulo)}</h2>
        ${n.resumo ? `<p class="hero-excerpt">${esc(n.resumo)}</p>` : ''}
        <div class="hero-meta">
          <span class="hero-src">${esc(n.fonte||'')}</span>
          <span>·</span>
          <time>${formatDate(n.data)}</time>
          <span class="hero-read">Ler artigo →</span>
        </div>
      </div>
    </a>`;
}

function renderSecCard(n) {
  const tag   = n.tags?.[0] || 'Novidades no Setor';
  const col   = catColor(tag);
  const grad  = CAT_GRADIENT[tag] || 'linear-gradient(135deg,#0f172a,#1e3a5f)';
  const emoji = CAT_EMOJI[tag] || '📄';
  return `
    <article class="sec-card">
      <div class="sec-img">
        ${n.imagem ? `<img src="${esc(n.imagem)}" alt="" loading="lazy" onerror="this.parentElement.querySelector('.sec-img-bg').style.display='block';this.style.display='none'">` : ''}
        <div class="sec-img-bg" style="background:${grad};display:${n.imagem?'none':'flex'}">
          <div class="sec-img-emoji">${emoji}</div>
        </div>
      </div>
      <div class="sec-body">
        <span class="sec-cat" style="background:${col}">${emoji} ${esc(tag)}</span>
        <h3 class="sec-title"><a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.titulo)}</a></h3>
        <div class="sec-meta">
          <span class="sec-src">${esc(n.fonte||'')}</span>
          <span>·</span>
          <time>${formatDate(n.data)}</time>
        </div>
      </div>
    </article>`;
}

// ── Card rendering ──────────────────────────────────────────────────────
function renderCard(n) {
  const tag     = n.tags?.[0] || 'Novidades no Setor';
  const col     = catColor(tag);
  const grad    = CAT_GRADIENT[tag] || 'linear-gradient(135deg,#0f172a,#1e3a5f)';
  const emoji   = CAT_EMOJI[tag] || '📄';
  const isRival = n.tags?.includes('Concorrentes');
  const date    = formatDate(n.data);

  return `<article class="card">
  <div class="card-img">
    ${n.imagem ? `<img src="${esc(n.imagem)}" alt="${esc(n.titulo)}" loading="lazy"
       onerror="this.parentElement.querySelector('.card-img-bg').style.display='block';this.style.display='none'">` : ''}
    <div class="card-img-bg" style="background:${grad};display:${n.imagem?'none':'block'}"></div>
    <div class="card-img-emoji" style="display:${n.imagem?'none':'flex'}">${emoji}</div>
  </div>
  <div class="card-body">
    ${isRival
      ? `<span class="card-rival-badge">⚔️ Concorrente</span>`
      : `<span class="card-cat" style="background:${col}">${emoji} ${esc(tag)}</span>`
    }
    <h3 class="card-title"><a href="${esc(n.url)}" target="_blank" rel="noopener">${esc(n.titulo)}</a></h3>
    ${n.resumo ? `<p class="card-excerpt">${esc(n.resumo)}</p>` : ''}
    <div class="card-footer">
      <span>
        <span class="card-src">${esc(n.fonte||'')}</span>
        <span class="card-date"> · ${date}</span>
      </span>
      <a class="card-link" href="${esc(n.url)}" target="_blank" rel="noopener">Ler →</a>
    </div>
  </div>
</article>`;
}

// ── Pagination ──────────────────────────────────────────────────────────
function renderPagination(total, current) {
  const pag = document.getElementById('pagination');
  if (total<=1) { pag.innerHTML=''; return; }

  const pages = [];
  // Always show first, last, current ±1, with ellipsis
  const show = new Set([1, total, current, current-1, current+1].filter(p=>p>=1&&p<=total));
  const sorted = [...show].sort((a,b)=>a-b);

  let html = '<div class="pag-inner">';
  html += `<button class="pag-btn" onclick="setPage(${current-1})" ${current===1?'disabled':''}>← Anterior</button>`;

  let prev = 0;
  for (const p of sorted) {
    if (p-prev>1) html += '<span class="pag-ellipsis">…</span>';
    html += `<button class="pag-btn ${p===current?'active':''}" onclick="setPage(${p})">${p}</button>`;
    prev = p;
  }

  html += `<button class="pag-btn" onclick="setPage(${current+1})" ${current===total?'disabled':''}>Próxima →</button>`;
  html += '</div>';
  pag.innerHTML = html;
}

// ── Main render ─────────────────────────────────────────────────────────
function render() {
  const news = filteredNews();
  const heroEl = document.getElementById('hero-section');
  const grid   = document.getElementById('grid');

  // Stats
  document.getElementById('statsTitle').textContent = state.cat || 'Todas as Notícias';
  document.getElementById('statsCount').textContent = news.length + ' notícias';

  const sm = document.getElementById('statsMonth');
  if (state.month) {
    sm.textContent = new Date(state.month+'-01').toLocaleString('pt-BR',{month:'long',year:'numeric'});
    sm.style.display='';
  } else { sm.style.display='none'; }

  const ss = document.getElementById('statsSearch');
  if (state.search) { ss.textContent='🔍 "'+state.search+'"'; ss.style.display=''; }
  else { ss.style.display='none'; }

  // Hero: only on page 1, no filters active, at least 3 articles
  const showHero = !state.cat && !state.month && !state.search && currentPage===1 && news.length>=3;
  let heroIds = new Set();

  if (showHero) {
    // Top-3 by _score (higher = more relevant/matched + has image + specialized source)
    const sorted = [...news].sort((a,b) => (b._score||0)-(a._score||0));
    const [h1, h2, h3] = sorted;
    heroIds = new Set([h1.id, h2.id, h3.id]);
    heroEl.style.display='block';
    heroEl.innerHTML = `
      <div class="hero-main">${renderHeroCard(h1)}</div>
      <div class="hero-secondary">${renderSecCard(h2)}${renderSecCard(h3)}</div>`;
  } else {
    heroEl.style.display='none';
  }

  const displayNews = news.filter(n => !heroIds.has(n.id));
  const totalPages = Math.ceil(displayNews.length / PAGE_SIZE);
  const pageNews   = displayNews.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);

  if (!pageNews.length && !showHero) {
    grid.innerHTML = `<div class="empty">
      <div class="empty-icon">🔍</div>
      <h3>Nenhuma notícia encontrada</h3>
      <p>Tente ajustar os filtros ou a busca.</p>
    </div>`;
    document.getElementById('pagination').innerHTML='';
    return;
  }

  grid.innerHTML = pageNews.map(renderCard).join('');
  renderPagination(totalPages, currentPage);
}

// ── Controls ─────────────────────────────────────────────────────────────
function setCategory(cat) {
  state.cat = cat;
  currentPage = 1;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat===cat));
  render();
  if (window.innerWidth<=700) toggleSidebar(false);
  window.scrollTo({top:0,behavior:'smooth'});
}

function setMonth(m) {
  state.month = state.month===m ? '' : m;
  currentPage = 1;
  renderSidebar();
  render();
}

function setPage(p) {
  currentPage = p;
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

function onSearch(val) {
  state.search = val.trim();
  currentPage = 1;
  document.getElementById('searchClear').style.display = val ? 'block' : 'none';
  render();
}

function clearSearch() {
  const inp = document.getElementById('searchInput');
  inp.value=''; onSearch(''); inp.focus();
}

function toggleSidebar(force) {
  const s = document.getElementById('sidebar');
  const o = document.getElementById('sidebarOverlay');
  const open = force!==undefined ? force : !s.classList.contains('open');
  s.classList.toggle('open', open);
  o.classList.toggle('open', open);
}

init();
</script>
