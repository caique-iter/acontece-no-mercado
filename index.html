<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Acontece no Mercado</title>
  <style>
    :root{--primary:#1a3a5c;--accent:#e8a020;--bg:#f0f2f6;--card:#fff;--text:#1e2d3d;--muted:#6b7a8d;--border:#dde3ec;--r:10px}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}
    header{background:var(--primary);color:#fff;padding:0 24px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
    .hi{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:62px;gap:16px}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
    .logo-icon{font-size:26px}.logo-text{font-size:19px;font-weight:700}.logo-sub{font-size:10px;opacity:.6;letter-spacing:.8px;text-transform:uppercase}
    .hr{display:flex;align-items:center;gap:14px;flex-shrink:0}
    .sw{position:relative}
    .sw input{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;padding:8px 36px 8px 12px;border-radius:20px;font-size:13px;width:230px;outline:none;transition:background .2s}
    .sw input::placeholder{color:rgba(255,255,255,.45)}.sw input:focus{background:rgba(255,255,255,.2)}
    .si{position:absolute;right:11px;top:50%;transform:translateY(-50%);opacity:.5;pointer-events:none}
    #sb{font-size:11px;opacity:.65;white-space:nowrap}
    #ra{display:none;background:#fff3cd;border-bottom:2px solid #e8a020;padding:8px 24px;font-size:13px;font-weight:500;color:#7a4a00;cursor:pointer;text-align:center}
    #ra:hover{background:#fde8a0}
    .fb{background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:99}
    .fi{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
    .fi::-webkit-scrollbar{display:none}
    .btn{padding:11px 14px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);white-space:nowrap;border-bottom:3px solid transparent;transition:all .15s;display:flex;align-items:center;gap:5px}
    .btn:hover{color:var(--primary)}.btn.on{color:var(--primary);border-bottom-color:var(--accent);font-weight:700}
    .bdg{display:inline-flex;align-items:center;justify-content:center;background:var(--bg);border-radius:10px;font-size:11px;padding:1px 6px;color:var(--muted);min-width:20px}
    .btn.on .bdg{background:var(--accent);color:#fff}
    .rv{border-left:3px solid #dc3545!important}
    main{max-width:1280px;margin:0 auto;padding:20px 24px}
    .tb{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;flex-wrap:wrap}
    .mn{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
    .mb{background:var(--card);border:1px solid var(--border);padding:5px 13px;border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;color:var(--muted);transition:all .15s}
    .mb:hover{border-color:var(--primary);color:var(--primary)}.mb.on{background:var(--primary);color:#fff;border-color:var(--primary)}
    #tl{font-size:13px;color:var(--muted)}
    #ng{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s,transform .2s;text-decoration:none;color:inherit}
    .card:hover{box-shadow:0 6px 24px rgba(0,0,0,.11);transform:translateY(-2px)}.card.rival{border-left:3px solid #dc3545}
    .ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .cd{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px}
    .tr{display:flex;flex-wrap:wrap;gap:5px}
    .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff;letter-spacing:.3px;text-transform:uppercase;cursor:pointer;transition:opacity .15s}
    .tag:hover{opacity:.8}
    .ct{font-size:14px;font-weight:600;line-height:1.45;color:var(--text)}
    .cr{font-size:12.5px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
    .cf{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:10px;border-top:1px solid var(--border)}
    .fn{font-size:11px;color:var(--muted);font-weight:500}.rl{font-size:12px;color:var(--primary);font-weight:700;text-decoration:none}
    .rl:hover{text-decoration:underline}
    .sb{grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--muted)}
    .si2{font-size:52px;margin-bottom:18px}.sb h3{font-size:18px;margin-bottom:10px;color:var(--text)}.sb p{font-size:14px;max-width:440px;margin:0 auto;line-height:1.7}
    @keyframes spin{to{transform:rotate(360deg)}}
    .sp{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 20px}
    footer{text-align:center;padding:20px 24px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);margin-top:40px}
  </style>
</head>
<body>
<header>
  <div class="hi">
    <a class="logo" href="#" onclick="reset();return false">
      <span class="logo-icon">&#128478;&#65039;</span>
      <div><div class="logo-text">Acontece no Mercado</div><div class="logo-sub">Grupo Iter &middot; Monitor Tur&iacute;stico</div></div>
    </a>
    <div class="hr">
      <div class="sw">
        <input type="text" id="si" placeholder="Buscar not&iacute;cias..." />
        <svg class="si" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <span id="sb">Carregando&hellip;</span>
    </div>
  </div>
</header>
<div id="ra" onclick="filtrar('Concorrentes')">&#9876;&#65039; <span id="rc"></span> men&ccedil;&atilde;o(es) a concorrentes hoje &mdash; clique para ver</div>
<div class="fb"><div class="fi" id="fi"></div></div>
<main>
  <div class="tb"><div class="mn" id="mn"></div><span id="tl"></span></div>
  <div id="ng"><div class="sb"><div class="sp"></div><h3>Carregando not&iacute;cias&hellip;</h3></div></div>
</main>
<footer id="ft">Acontece no Mercado &middot; Grupo Iter</footer>
<script>
var ALL=[],TAG='Todas',MES=null,Q='',CORES={},EMJS={};
var fmtD=function(s){return new Date(s).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'})};
var fmtM=function(s){var p=s.split('-');return new Date(p[0],p[1]-1,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'})};
var getMes=function(s){return s.substring(0,7)};
var cor=function(n){return CORES[n]||'#6b7a8d'};
var emj=function(n){return EMJS[n]||''};
function base(){
  var l=ALL;
  if(MES) l=l.filter(function(n){return getMes(n.data)===MES});
  if(Q.length>=2){var q=Q.toLowerCase();l=l.filter(function(n){return n.titulo.toLowerCase().indexOf(q)>=0||(n.resumo||'').toLowerCase().indexOf(q)>=0||n.fonte.toLowerCase().indexOf(q)>=0||(n.tags||[]).join(' ').toLowerCase().indexOf(q)>=0})}
  return l;
}
function lista(){
  var l=base();
  if(TAG!=='Todas') l=l.filter(function(n){return (n.tags||[n.categoria]).indexOf(TAG)>=0});
  return l;
}
function render(){
  var l=lista();
  var ng=document.getElementById('ng');
  document.getElementById('tl').textContent=l.length?l.length+' not\xedcia'+(l.length!==1?'s':''):'';
  if(!l.length){ng.innerHTML='<div class="sb"><div class="si2">&#128205;</div><h3>Nenhuma not\xedcia encontrada</h3><p>Tente outro filtro, m\xeas ou termo de busca.</p></div>';return}
  ng.innerHTML=l.map(function(n){
    var tags=n.tags||[n.categoria];
    var rival=tags.indexOf('Concorrentes')>=0;
    var th=tags.map(function(t){
      return '<span class="tag" style="background:'+cor(t)+'" onclick="event.preventDefault();filtrar(\''+t.replace(/'/g,"\\'")+'\')" title="Filtrar por '+t+'">'+emj(t)+' '+t+'</span>';
    }).join('');
    return '<a class="card'+(rival?' rival':'')+'" href="'+n.url+'" target="_blank" rel="noopener">'
      +'<div class="ch"><div class="tr">'+th+'</div><span class="cd">'+fmtD(n.data)+'</span></div>'
      +'<div class="ct">'+n.titulo+'</div>'
      +(n.resumo?'<div class="cr">'+n.resumo+'</div>':'')
      +'<div class="cf"><span class="fn">&#128240; '+n.fonte+'</span><span class="rl">Ler &rarr;</span></div>'
      +'</a>';
  }).join('');
}
function contagens(){
  var b=base();
  document.querySelectorAll('.btn').forEach(function(btn){
    var t=btn.dataset.tag;
    var c=t==='Todas'?b.length:b.filter(function(n){return (n.tags||[n.categoria]).indexOf(t)>=0}).length;
    var bdg=btn.querySelector('.bdg');
    if(bdg) bdg.textContent=c;
  });
}
function filtrar(tag){
  TAG=tag;
  document.querySelectorAll('.btn').forEach(function(b){b.classList.toggle('on',b.dataset.tag===tag)});
  contagens();render();
  window.scrollTo({top:120,behavior:'smooth'});
}
function reset(){
  TAG='Todas';Q='';document.getElementById('si').value='';
  document.querySelectorAll('.btn').forEach(function(b){b.classList.toggle('on',b.dataset.tag==='Todas')});
  contagens();render();
}
function meses(){
  var ms=[...new Set(ALL.map(function(n){return getMes(n.data)}))].sort().reverse();
  if(!ms.length) return;
  MES=ms[0];
  document.getElementById('mn').innerHTML=ms.map(function(m){
    return '<button class="mb'+(m===MES?' on':'')+'" onclick="selMes(\''+m+'\',this)">'+fmtM(m)+'</button>';
  }).join('');
}
function selMes(m,btn){
  MES=m;
  document.querySelectorAll('.mb').forEach(function(b){b.classList.remove('on')});
  btn.classList.add('on');
  contagens();render();
}
function filtros(cats){
  var bar=document.getElementById('fi');bar.innerHTML='';
  var t=document.createElement('button');t.className='btn on';t.dataset.tag='Todas';
  t.onclick=function(){filtrar('Todas')};t.innerHTML='Todas <span class="bdg">0</span>';bar.appendChild(t);
  var present=new Set();ALL.forEach(function(n){(n.tags||[n.categoria]).forEach(function(x){present.add(x)})});
  var ordem=cats.map(function(c){return c.nome});
  var sorted=[...present].sort(function(a,b){var ia=ordem.indexOf(a),ib=ordem.indexOf(b);if(ia<0&&ib<0) return a.localeCompare(b);if(ia<0) return 1;if(ib<0) return -1;return ia-ib});
  sorted.forEach(function(tag){
    var btn=document.createElement('button');btn.className='btn'+(tag==='Concorrentes'?' rv':'');
    btn.dataset.tag=tag;btn.onclick=function(){filtrar(tag)};
    btn.innerHTML=emj(tag)+' '+tag+' <span class="bdg">0</span>';bar.appendChild(btn);
  });
}
function rivais(){
  var hoje=new Date().toISOString().substring(0,10);
  var r=ALL.filter(function(n){return (n.tags||[]).indexOf('Concorrentes')>=0&&n.data.startsWith(hoje)});
  if(r.length){document.getElementById('rc').textContent=r.length;document.getElementById('ra').style.display='block'}
}
document.getElementById('si').addEventListener('input',function(){Q=this.value.trim();contagens();render()});
async function init(){
  var cats=[];
  try{var rc=await fetch('config.json?t='+Date.now());if(rc.ok){var cfg=await rc.json();cats=cfg.categorias||[];cats.forEach(function(c){CORES[c.nome]=c.cor;EMJS[c.nome]=c.emoji||''})}}catch(e){}
  try{
    var rd=await fetch('data/noticias.json?t='+Date.now());
    if(!rd.ok) throw new Error('HTTP '+rd.status);
    var d=await rd.json();ALL=d.noticias||[];
    var sb=document.getElementById('sb');
    if(d.ultima_atualizacao){var dt=new Date(d.ultima_atualizacao);sb.textContent='Atualizado '+dt.toLocaleDateString('pt-BR')+' '+dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}
    else sb.textContent=ALL.length?ALL.length+' not\xedcias':'Aguardando coleta';
    document.getElementById('ft').textContent='Acontece no Mercado \xb7 Grupo Iter \xb7 '+ALL.length+' not\xedcias \xb7 Coleta autom\xe1tica di\xe1ria';
    if(!ALL.length){document.getElementById('ng').innerHTML='<div class="sb"><div class="si2">&#128640;</div><h3>Sistema pronto!</h3><p>Nenhuma not\xedcia ainda. Aguarde a primeira coleta ou rode o coletor.py manualmente.</p></div>';return}
    meses();filtros(cats);rivais();contagens();render();
  }catch(e){
    document.getElementById('ng').innerHTML='<div class="sb"><div class="si2">&#9888;&#65039;</div><h3>Erro ao carregar dados</h3><p>'+e.message+'</p></div>';
    document.getElementById('sb').textContent='Erro';
  }
}
init();
</script>
</body>
</html>
